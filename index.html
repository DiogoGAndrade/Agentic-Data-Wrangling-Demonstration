<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic Data Wrangling — Visual Prototype</title>
<style>
    * {
        box-sizing: border-box;
    }

    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f5f7fb;
        font-family: Arial, Helvetica, sans-serif;
    }

    .page {
        display: grid;
        grid-template-columns: minmax(270px, 24vw) 1fr;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
    }

    .sidebar {
        height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
        background: white;
        border-right: 1px solid #dfe5ed;
        scrollbar-gutter: stable;
    }

    .main {
        height: 100vh;
        overflow-y: auto;
        overflow-x: auto;
        background: #f5f7fb;
        scrollbar-gutter: stable;
    }

    .sidebar img {
        display: block;
        width: 100%;
        height: auto;
    }

    .main-inner {
        width: min(100%, 1050px);
        min-width: 760px;
        margin: 0 auto;
        background: #f5f7fb;
    }

    .main img {
        display: block;
        width: 100%;
        height: auto;
        margin: 0;
        padding: 0;
    }

    .notice {
        position: fixed;
        right: 18px;
        bottom: 16px;
        z-index: 10;
        padding: 9px 13px;
        border-radius: 8px;
        background: rgba(31, 56, 100, 0.92);
        color: white;
        font-size: 12px;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.14);
        pointer-events: none;
    }

    @media (max-width: 800px) {
        .page {
            grid-template-columns: 230px 1fr;
        }

        .main-inner {
            min-width: 680px;
        }

        .notice {
            display: none;
        }
    }
</style>
</head>
